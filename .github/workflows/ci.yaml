name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # The shipped Rego, tested with Rego. A rule that matches nothing looks
      # exactly like a rule that works, so this is not optional.
      - run: make policy-test

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/paddock
      - run: helm template paddock deploy/helm/paddock > /dev/null
      # Exercise the conditional blocks: pi agent, openai upstream, ingress, PVC.
      - run: >
          helm template paddock deploy/helm/paddock
          --set agentImagePi=example/agent-pi:ci
          --set gateway.openai.upstream=http://models.svc
          --set gateway.openai.model=example/model
          --set gateway.openai.caConfigMap=openai-ca
          --set ingress.enabled=true --set ingress.tls.enabled=true
          --set persistence.enabled=true > /dev/null

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t paddock:ci .
      - run: docker build -t paddock-agent-pi:ci -f Dockerfile.agent-pi .
      # Dockerfile.agent (Claude Code) is exercised too; it's the slowest, last.
      - run: docker build -t paddock-agent-claude:ci -f Dockerfile.agent .
