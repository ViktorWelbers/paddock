# Example ArgoCD Application for GitOps deployment (app-of-apps friendly).
# Copy into your GitOps repo and adjust the inline values.
#
# Prerequisites:
#   - images pushed to a registry your cluster can pull from (make push REGISTRY=...)
#   - Secret paddock-anthropic with key ANTHROPIC_API_KEY in the paddock namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paddock
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ViktorWelbers/paddock
    targetRevision: main
    path: deploy/helm/paddock
    helm:
      releaseName: paddock
      values: |
        image:
          repository: <your-registry>/paddock/paddock
          tag: <tag>
        agentImage: <your-registry>/paddock/agent-claude:<tag>
        # Optional: OpenAI-compatible upstream for the pi agent
        # agentImagePi: <your-registry>/paddock/agent-pi:<tag>
        # gateway:
        #   openai:
        #     upstream: http://your-model-server.namespace.svc
        #     model: your/model
  destination:
    server: https://kubernetes.default.svc
    namespace: paddock
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
