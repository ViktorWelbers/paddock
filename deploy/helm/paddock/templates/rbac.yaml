apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
---
# Sandboxes run in this namespace alongside the control plane, so the server
# needs nothing cluster-scoped: it never creates a namespace and cannot touch
# anything outside its own. That matters — paddock has to install into
# clusters where nobody is handing out cluster-admin.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-provisioner
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, delete, get, list]
  # Streams the developer's workspace in and out of the sandbox (tar over
  # exec), so the CLI needs no cluster access of its own. `get` as well as
  # `create`: the websocket executor opens the stream with a GET, and only
  # the SPDY fallback uses POST.
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create, get]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-provisioner
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
