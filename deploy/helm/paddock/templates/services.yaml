apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-server
  labels:
    app.kubernetes.io/name: paddock
    # The CLI discovers the control plane by this label when it has to
    # fall back to a port-forward.
    paddock.dev/component: server
spec:
  selector:
    app.kubernetes.io/name: paddock
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.server.port }}
      targetPort: {{ .Values.server.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app.kubernetes.io/name: paddock
spec:
  selector:
    app.kubernetes.io/name: paddock
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
    {{- if .Values.gateway.egress.enabled }}
    - name: egress
      port: {{ .Values.gateway.egress.port }}
      targetPort: {{ .Values.gateway.egress.port }}
    {{- end }}
