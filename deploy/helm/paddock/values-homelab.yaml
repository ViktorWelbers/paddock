# Overrides for the homelab k3s cluster (Harbor registry, traefik ingress,
# cert-manager internal CA, local-path storage).
#
#   helm upgrade --install paddock deploy/helm/paddock \
#     -n paddock --create-namespace \
#     -f deploy/helm/paddock/values-homelab.yaml \
#     --set image.tag=<tag> --set agentImage=harbor.internal/paddock/agent-claude:<tag>

image:
  repository: harbor.internal/paddock/paddock
  tag: dev

agentImage: harbor.internal/paddock/agent-claude:dev
agentImagePi: harbor.internal/paddock/agent-pi:dev

gateway:
  openai:
    # The homelab vLLM (OpenAI-compatible), behind the cert-manager CA.
    # kubectl -n paddock create configmap homelab-ca --from-file=ca.crt=<path>
    upstream: https://vllm.internal
    model: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
    caConfigMap: homelab-ca

ingress:
  enabled: true
  className: traefik
  host: paddock.internal
  annotations:
    cert-manager.io/cluster-issuer: "ca-issuer"
  tls:
    enabled: true

persistence:
  enabled: true
  size: 1Gi
  storageClassName: local-path
